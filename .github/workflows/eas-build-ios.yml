name: EAS Build iOS

on:
  push:
    branches:
      - main
      - release/*
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN || secrets.EAS_TOKEN }}
    steps:
      - uses: actions/checkout@v3
      
      - uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install project dependencies
        run: npm ci
      
      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Validate Expo token
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "Missing secret. Add EXPO_TOKEN or EAS_TOKEN in repository secrets."
            exit 1
          fi

      - name: Verify Expo account
        run: |
          ACTUAL_ACCOUNT="$(eas whoami --non-interactive)"
          echo "EAS authenticated as: $ACTUAL_ACCOUNT"
          # Extract just the account name (first word before any parentheses or extra info)
          ACCOUNT_NAME=$(echo "$ACTUAL_ACCOUNT" | awk '{print $1}')
          if [ "$ACCOUNT_NAME" != "hoyri" ]; then
            echo "Wrong Expo account. Expected: hoyri, got: $ACCOUNT_NAME"
            echo "Create token while logged in as hoyri and update EXPO_TOKEN (or EAS_TOKEN)."
            exit 1
          fi
      
      - name: Build iOS (Preview)
        run: eas build --platform ios --profile preview --non-interactive
