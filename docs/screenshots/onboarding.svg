<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="2340" viewBox="0 0 1080 2340">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#fcf9f4"/>
      <stop offset="100%" stop-color="#f7f2e8"/>
    </linearGradient>
    <linearGradient id="hero" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#D8C08F"/>
      <stop offset="100%" stop-color="#BE9347"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-opacity="0.12" flood-color="#6e5f4f"/>
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="url(#bg)"/>
  <rect x="0" y="0" width="100%" height="120" fill="#fcf9f4"/>
  <text x="60" y="78" font-family="Georgia, serif" font-size="42" fill="#823b18">Spark ✦</text>
  <text x="60" y="130" font-family="Arial, sans-serif" font-size="30" fill="#7D6F5E">Onboarding</text>

  
  <text x="60" y="260" font-family="Georgia, serif" font-size="78" fill="#1A1A1A">Günlük 5 dakikada</text>
  <text x="60" y="338" font-family="Georgia, serif" font-size="78" fill="#823b18">daha berrak zihin</text>
  <text x="60" y="404" font-family="Arial, sans-serif" font-size="34" fill="#7D6F5E">İlham veren hikayeler, pratik dersler.</text>

  
  <g filter="url(#shadow)">
    <rect x="60" y="470" rx="28" ry="28" width="960" height="210" fill="#ffffff" stroke="#E8E3DA"/>
    <text x="88" y="534" font-family="Georgia, serif" font-size="40" fill="#1A1A1A">Psikoloji</text>
    <text x="88" y="578" font-family="Arial, sans-serif" font-size="28" fill="#7D6F5E">Zihin, dikkat ve davranış kalıpları</text>
  </g>
  
  <g filter="url(#shadow)">
    <rect x="60" y="700" rx="28" ry="28" width="960" height="210" fill="#ffffff" stroke="#E8E3DA"/>
    <text x="88" y="764" font-family="Georgia, serif" font-size="40" fill="#1A1A1A">Liderlik</text>
    <text x="88" y="808" font-family="Arial, sans-serif" font-size="28" fill="#7D6F5E">Karar alma, etki ve ekip yönetimi</text>
  </g>
  
  <g filter="url(#shadow)">
    <rect x="60" y="930" rx="28" ry="28" width="960" height="210" fill="#ffffff" stroke="#E8E3DA"/>
    <text x="88" y="994" font-family="Georgia, serif" font-size="40" fill="#1A1A1A">Bilim</text>
    <text x="88" y="1038" font-family="Arial, sans-serif" font-size="28" fill="#7D6F5E">Araştırma ve gelecek perspektifi</text>
  </g>

  <rect x="60" y="2000" rx="22" ry="22" width="960" height="98" fill="#823b18"/>
  <text x="430" y="2062" font-family="Arial, sans-serif" font-size="34" fill="#fff">Devam Et</text>
  <text x="475" y="2148" font-family="Arial, sans-serif" font-size="26" fill="#7D6F5E">Adım 2/4</text>
