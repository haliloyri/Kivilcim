<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="2340" viewBox="0 0 1080 2340">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#fcf9f4"/>
      <stop offset="100%" stop-color="#f7f2e8"/>
    </linearGradient>
    <linearGradient id="hero" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#D8C08F"/>
      <stop offset="100%" stop-color="#BE9347"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-opacity="0.12" flood-color="#6e5f4f"/>
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="url(#bg)"/>
  <rect x="0" y="0" width="100%" height="120" fill="#fcf9f4"/>
  <text x="60" y="78" font-family="Georgia, serif" font-size="42" fill="#823b18">Spark ✦</text>
  <text x="60" y="130" font-family="Arial, sans-serif" font-size="30" fill="#7D6F5E">Hikaye Detayı</text>

  
  <rect x="60" y="190" rx="30" ry="30" width="960" height="350" fill="#EBE2D3" stroke="#E8E3DA"/>
  <text x="96" y="270" font-family="Arial, sans-serif" font-size="26" fill="#594238">Psikoloji</text>
  <text x="96" y="338" font-family="Georgia, serif" font-size="56" fill="#1A1A1A">Hızlı Düşün, Yavaş Karar Ver</text>
  <text x="96" y="394" font-family="Arial, sans-serif" font-size="28" fill="#594238">5 dk okuma</text>

  <rect x="60" y="580" rx="20" ry="20" width="960" height="250" fill="#fff" stroke="#E8E3DA"/>
  <text x="96" y="646" font-family="Arial, sans-serif" font-size="30" fill="#1A1A1A">Zihnimiz çoğu zaman kısa yolları tercih eder.</text>
  <text x="96" y="700" font-family="Arial, sans-serif" font-size="30" fill="#1A1A1A">Bu durum hızlı karar almayı kolaylaştırırken</text>
  <text x="96" y="754" font-family="Arial, sans-serif" font-size="30" fill="#1A1A1A">bazen hatalı çıkarımlara da yol açar.</text>

  <rect x="60" y="870" rx="20" ry="20" width="960" height="170" fill="#F5F0E6" stroke="#E8E3DA"/>
  <rect x="84" y="896" width="10" height="118" fill="#C5A059"/>
  <text x="110" y="958" font-family="Georgia, serif" font-size="38" fill="#1A1A1A">"Yavaşlamak, daha iyi düşünmektir."</text>

  <rect x="60" y="1080" rx="20" ry="20" width="960" height="230" fill="#F7F3E8" stroke="#E8E3DA"/>
  <text x="96" y="1142" font-family="Arial, sans-serif" font-size="28" fill="#594238">Bu hikayenin ilham kaynağı:</text>
  <text x="96" y="1204" font-family="Georgia, serif" font-size="44" fill="#1A1A1A">Thinking, Fast and Slow</text>

  <rect x="60" y="2140" rx="18" ry="18" width="340" height="96" fill="transparent" stroke="#823b18"/>
  <text x="168" y="2200" font-family="Arial, sans-serif" font-size="32" fill="#1A1A1A">Paylaş</text>
  <rect x="420" y="2140" rx="18" ry="18" width="600" height="96" fill="#823b18"/>
  <text x="568" y="2200" font-family="Arial, sans-serif" font-size="32" fill="#fff">Sonraki hikaye</text>
