<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Spark Screenshots</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #f4efe6; color: #1A1A1A; }
    .wrap { max-width: 1280px; margin: 0 auto; padding: 24px; }
    h1 { margin: 0 0 16px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; }
    article { background: #fff; border: 1px solid #E8E3DA; border-radius: 12px; padding: 12px; }
    h2 { font-size: 16px; margin: 0 0 10px; color: #594238; }
    img { width: 100%; height: auto; border-radius: 8px; border: 1px solid #E8E3DA; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Spark App Screenshots</h1>
    <div class="grid">
    <article>
      <h2>home</h2>
      <img src="./home.svg" alt="home screenshot" loading="lazy" />
    </article>

    <article>
      <h2>onboarding</h2>
      <img src="./onboarding.svg" alt="onboarding screenshot" loading="lazy" />
    </article>

    <article>
      <h2>library</h2>
      <img src="./library.svg" alt="library screenshot" loading="lazy" />
    </article>

    <article>
      <h2>progress</h2>
      <img src="./progress.svg" alt="progress screenshot" loading="lazy" />
    </article>

    <article>
      <h2>profile</h2>
      <img src="./profile.svg" alt="profile screenshot" loading="lazy" />
    </article>
    </div>
  </div>
</body>
</html>
